<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-body); padding:28px; }
  #root { display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:640px; }

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>

<script type="text/babel">
  const { Input, Textarea } = window.AIBasecampTVDesignSystem_944591;
  function Demo() {
    return (
      <>
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <Input label="Your email" placeholder="you@example.com" helper="We'll send your Starter Kit here. No spam." />
          <Input label="First name" placeholder="Diane" />
        </div>
        <Textarea label="The prompt to copy" monospace readOnly rows={6}
          value={'Explain growing tomatoes to a beginner in plain language, and name one common mistake people make.'} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
